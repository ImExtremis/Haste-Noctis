# Generated by Noctis install.sh
# Applies local deployment configuration

services:
  valkey:
    restart: unless-stopped
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  noctis_server:
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${NOCTIS_HTTP_PORT:-8080}:8080"
    logging: *default-logging

  meilisearch:
    restart: unless-stopped
    logging: *default-logging

  elasticsearch:
    restart: unless-stopped
    logging: *default-logging

  livekit:
    restart: unless-stopped
    logging: *default-logging

account_disabled_suspicious:
  subject: החשבון שלכם ב-Noctis הושבת זמנית
  body: |-
    היי {username},

    השבתנו זמנית את חשבון ה-Noctis שלכם בעקבות פעילות חשודה.

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    כדי לקבל שוב גישה לחשבון, צריך לאפס את הסיסמה:

    {forgotUrl}

    אחרי איפוס הסיסמה תוכלו להתחבר שוב.

    אם נראה לכם שזו טעות, פנו לצוות התמיכה שלנו.

    – צוות הבטיחות של Noctis
account_scheduled_deletion:
  subject: החשבון שלכם ב-Noctis מיועד למחיקה
  body: |-
    היי {username},

    החשבון שלכם ב-Noctis סומן למחיקה לצמיתות בעקבות הפרה של תנאי השימוש או כללי הקהילה שלנו.

    תאריך מחיקה מתוכנן: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    זו פעולת אכיפה חמורה. נתוני החשבון שלכם יימחקו לצמיתות בתאריך שנקבע.

    מומלץ לעבור על:
    - תנאי השימוש: {termsUrl}
    - כללי הקהילה: {guidelinesUrl}

    תהליך ערעור:
    אם לדעתכם ההחלטה שגויה או לא מוצדקת, תוכלו להגיש ערעור בתוך 60 יום. שלחו אימייל ל-appeals@noctis.app, והגישו אותו מכתובת האימייל הזו.

    בערעור:
    - הסבירו בבירור מדוע לדעתכם ההחלטה שגויה או לא מוצדקת
    - צרפו ראיות או הקשר רלוונטיים, אם יש

    נציג או נציגה מצוות הבטיחות של Noctis יבדקו את הערעור, וייתכן שהמחיקה המתוכננת תוקפא עד לקבלת החלטה סופית.

    – צוות הבטיחות של Noctis
account_temp_banned:
  subject: החשבון שלכם ב-Noctis הושעה זמנית
  body: |-
    היי {username},

    החשבון שלכם ב-Noctis הושעה זמנית בעקבות הפרה של תנאי השימוש או כללי הקהילה שלנו.

    משך: {durationHours, plural,
      =1 {שעה אחת}
      other {# שעות}
    }
    ההשעיה בתוקף עד: {bannedUntil, date, full} {bannedUntil, time, short}

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    בזמן הזה לא תהיה לכם גישה לחשבון.

    מומלץ לעבור על:
    - תנאי השימוש: {termsUrl}
    - כללי הקהילה: {guidelinesUrl}

    אם לדעתכם ההחלטה שגויה או לא מוצדקת, תוכלו להגיש ערעור ל-appeals@noctis.app מהכתובת הזו. הסבירו בבירור מדוע לדעתכם ההחלטה שגויה. נבדוק את הערעור ונחזור אליכם עם החלטה.

    – צוות הבטיחות של Noctis
donation_confirmation:
  subject: תודה על התרומה שלך ל-Noctis
  body: |-
    שלום,

    תודה על התרומה שלך ל-Noctis! {interval, select,
      month {התרומה החוזרת שלך}
      year {התרומה החוזרת שלך}
      other {התרומה החד-פעמית שלך}
    } {interval, select,
      month {הוגדרה}
      year {הוגדרה}
      other {עובדה}
    } בהצלחה.

    פרטי התרומה:
    סכום: {amount} {currency} {interval, select,
      month {לחודש}
      year {לשנה}
      other {}
    }

    Stripe ישלח לך אימייל נפרד עם קבלה והפקטורה שלך בפורמט PDF בקרוב. זה כולל את כל פרטי התשלום וניתן להשתמש בו למטרות מס.

    באפשרותך לצפות בהיסטוריית התרומות שלך, להוריד פקטורות, {interval, select,
      month {ולנהל או לבטל את המינוי שלך}
      year {ולנהל או לבטל את המינוי שלך}
      other {ולנהל תרומות עתידיות}
    } בכל עת באמצעות הקישור הזה:

    {manageUrl}

    התמיכה שלך עוזרת לשמור על Noctis פעיל. תודה!

    – צוות Noctis
donation_magic_link:
  subject: נהלו את התרומות שלכם ל-Noctis
  body: |-
    שלום,

    לחצו על הקישור שלמטה כדי לגשת לפורטל התורמים שלכם:

    {manageUrl}

    בפורטל, באפשרותכם לנהל מינויים, להוריד פקטורות, ולצפות בהיסטוריית התרומות שלכם.

    הקישור תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם את הקישור הזה, תוכלו להתעלם מהאימייל בלי חשש.

    – צוות Noctis
dsa_report_verification:
  subject: אמתו את כתובת האימייל להגשת דיווח DSA
  body: |-
    היי,

    השתמשו בקוד שלמטה כדי להגיש דיווח לפי חוק השירותים הדיגיטליים (DSA) ב-Noctis:

    {code}

    הקוד תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם זאת, תוכלו להתעלם מהאימייל הזה.

    – צוות הבטיחות של Noctis
email_change_new:
  subject: אמתו את כתובת האימייל החדשה שלכם ב-Noctis
  body: |-
    היי {username},

    הזינו את הקוד הזה באפליקציה כדי לאמת את כתובת האימייל החדשה שלכם ב-Noctis:

    {code}

    הקוד תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם זאת, תוכלו להתעלם מהאימייל הזה.

    – צוות Noctis
email_change_original:
  subject: אשרו שינוי כתובת אימייל ב-Noctis
  body: |-
    היי {username},

    קיבלנו בקשה לשנות את כתובת האימייל בחשבון ה-Noctis שלכם.

    כדי לאשר את השינוי, הזינו את הקוד הזה באפליקציה:

    {code}

    הקוד תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם זאת, אבטחו את החשבון שלכם מיד.

    – צוות Noctis
email_change_revert:
  subject: כתובת האימייל שלכם ב-Noctis השתנתה
  body: |-
    היי {username},

    כתובת האימייל בחשבון ה-Noctis שלכם שונתה ל-{newEmail}.

    אם אתם ביצעתם את השינוי, לא צריך לעשות כלום. אם לא, תוכלו לבטל את השינוי ולאבטח את החשבון דרך הקישור הזה:

    {revertUrl}

    הפעולה הזו תחזיר את כתובת האימייל הקודמת, תנתק אתכם מכל המכשירים, תסיר מספרי טלפון מקושרים, תכבה אימות דו-שלבי, ותדרוש מכם לבחור סיסמה חדשה.

    – צוות הבטיחות של Noctis
email_verification:
  subject: אמתו את כתובת האימייל שלכם ב-Noctis
  body: |-
    היי {username},

    כדי לאמת את כתובת האימייל לחשבון ה-Noctis שלכם, לחצו על הקישור שלמטה:

    {verifyUrl}

    אם לא פתחתם חשבון Noctis, תוכלו להתעלם מהאימייל הזה בלי חשש.

    הקישור הזה תקף ל-24 שעות.

    – צוות Noctis
gift_chargeback_notification:
  subject: ההטבות מהמתנה שמימשתם הוסרו
  body: |-
    היי {username},

    קוד מתנה שמימשתם שולם במקור על ידי מישהו אחר. מאז בוצעה הכחשת עסקה (Chargeback) והתשלום הוחזר.

    לכן הסרנו את ההטבות שנוספו לחשבון שלכם בעת מימוש המתנה.

    אם נראה לכם שזו טעות, פנו לצוות התמיכה שלנו וצרפו כל פרט שיש לכם על קוד המתנה ועל מועד המימוש.

    – צוות Noctis
harvest_completed:
  subject: ייצוא הנתונים שלכם מ-Noctis מוכן להורדה
  body: |-
    היי {username},

    ייצוא הנתונים שלכם מוכן.

    קישור להורדה:
    {downloadUrl}

    הודעות שנכללו: {totalMessages, number}
    גודל הקובץ: {fileSizeMB, number} MB

    הקישור תקף עד {expiresAt, date, full} בשעה {expiresAt, time, short}.

    אם לא ביקשתם את הייצוא הזה, החליפו סיסמה מיד ופנו לצוות התמיכה שלנו.

    – צוות Noctis
inactivity_warning:
  subject: החשבון שלכם ב-Noctis מתוכנן למחיקה בגלל חוסר פעילות
  body: |-
    היי {username},

    לא ראינו פעילות בחשבון ה-Noctis שלכם מאז {lastActiveDate, date, full}.

    אם לא תתחברו עד {deletionDate, date, full} בשעה {deletionDate, time, short}, החשבון שלכם יימחק לצמיתות בגלל חוסר פעילות.

    התחברות כאן:
    {loginUrl}

    אם השתמשתם ב-Noctis לאחרונה, פנו לצוות התמיכה שלנו מיד.

    – צוות Noctis
ip_authorization:
  subject: אשרו התחברות מכתובת IP חדשה
  body: |-
    היי {username},

    זיהינו ניסיון התחברות לחשבון ה-Noctis שלכם מכתובת IP חדשה:

    כתובת IP: {ipAddress}
    מיקום: {location}

    אם זה הייתם אתם, אשרו את כתובת ה-IP הזו באמצעות הקישור שלמטה:

    {authUrl}

    אם לא ניסיתם להתחבר, החליפו סיסמה מיד.

    הקישור לאישור תקף ל-30 דקות.

    – צוות Noctis
password_change_verification:
  subject: אשרו את שינוי הסיסמה ב-Noctis
  body: |-
    היי {username},

    קיבלנו בקשה לשנות את הסיסמה בחשבון ה-Noctis שלכם.

    כדי לאשר את השינוי, הזינו את הקוד הזה באפליקציה:

    {code}

    הקוד תקף עד {expiresAt}.

    אם לא ביקשתם זאת, ייתכן שיש למישהו גישה לחשבון שלכם. החליפו את הסיסמה מיד והפעילו אימות דו-שלבי.

    – צוות Noctis
password_reset:
  subject: אפסו את הסיסמה שלכם ב-Noctis
  body: |-
    היי {username},

    התקבלה בקשה לאיפוס הסיסמה שלכם ב-Noctis. השתמשו בקישור שלמטה כדי לבחור סיסמה חדשה:

    {resetUrl}

    אם לא ביקשתם איפוס סיסמה, תוכלו להתעלם מהאימייל הזה בלי חשש.

    הקישור הזה תקף לשעה אחת.

    – צוות Noctis
registration_approved:
  subject: ההרשמה שלכם ל-Noctis אושרה
  body: |-
    היי {username},

    חדשות טובות: ההרשמה שלכם ל-Noctis אושרה.

    תוכלו להתחבר לאפליקציית Noctis כאן:
    {channelsUrl}

    ברוכים הבאים לקהילת Noctis.

    – צוות Noctis
report_resolved:
  subject: הדיווח שלכם ב-Noctis נבדק
  body: |-
    היי {username},

    הדיווח שלכם (מזהה: {reportId}) נבדק על ידי צוות הבטיחות שלנו.

    תשובת צוות הבטיחות:
    {publicComment}

    תודה שאתם עוזרים לשמור על Noctis בטוחה לכולם. אנחנו מתייחסים לכל דיווח ברצינות ומעריכים את התרומה שלכם לקהילה.

    אם יש לכם שאלות או חששות לגבי התוצאה, כתבו ל-safety@noctis.app.

    – צוות הבטיחות של Noctis
scheduled_deletion_notification:
  subject: החשבון שלכם ב-Noctis מיועד למחיקה
  body: |-
    היי {username},

    החשבון שלכם ב-Noctis סומן למחיקה לצמיתות.

    תאריך מחיקה מתוכנן: {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    זו פעולת אכיפה חמורה. נתוני החשבון שלכם יימחקו לצמיתות בתאריך שנקבע.

    אם לדעתכם ההחלטה שגויה, תוכלו להגיש ערעור ל-appeals@noctis.app מהכתובת הזו.

    – צוות הבטיחות של Noctis
self_deletion_scheduled:
  subject: מחיקת חשבון ה-Noctis שלכם מתוכננת
  body: |-
    היי {username},

    ביקשתם למחוק את חשבון ה-Noctis שלכם. החשבון מתוכנן למחיקה לצמיתות בתאריך:

    {deletionDate, date, full} בשעה {deletionDate, time, short}

    אם לא ביקשתם זאת, התחברו לחשבון כדי לבטל את המחיקה. מומלץ גם להחליף סיסמה כדי לאבטח את החשבון.

    – צוות Noctis
unban_notification:
  subject: ההשעיה של החשבון שלכם ב-Noctis בוטלה
  body: |-
    היי {username},

    חדשות טובות: ההשעיה של חשבון ה-Noctis שלכם בוטלה.

    {reason, select,
      null {}
      other {סיבה: {reason}}
    }

    תוכלו להתחבר שוב לחשבון ולהמשיך להשתמש ב-Noctis כרגיל.

    – צוות הבטיחות של Noctis

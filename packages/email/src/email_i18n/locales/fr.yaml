account_disabled_suspicious:
  subject: Ton compte Noctis a été temporairement désactivé
  body: |-
    Salut {username},

    Ton compte Noctis a été temporairement désactivé en raison d'une activité suspecte.

    {reason, select,
      null {}
      other {Motif : {reason}}
    }

    Pour récupérer l'accès à ton compte, tu dois réinitialiser ton mot de passe :

    {forgotUrl}

    Une fois ton mot de passe réinitialisé, tu pourras te reconnecter.

    Si tu penses qu'il s'agit d'une erreur, contacte notre support.

    – L'équipe sécurité de Noctis
account_scheduled_deletion:
  subject: Ton compte Noctis va être supprimé définitivement
  body: |-
    Salut {username},

    Ton compte Noctis a été programmé pour une suppression définitive, car tu as enfreint nos conditions d'utilisation ou nos règles de la communauté.

    Date de suppression : {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {Motif : {reason}}
    }

    C'est une mesure de modération sérieuse. Les données de ton compte seront supprimées définitivement à la date prévue.

    Merci de consulter :
    - Conditions d'utilisation : {termsUrl}
    - Règles de la communauté : {guidelinesUrl}

    Faire appel :
    Si tu penses que cette décision est incorrecte ou injustifiée, tu disposes de 60 jours pour faire appel. Envoie un e-mail à appeals@noctis.app depuis cette adresse e-mail.

    Dans ton appel :
    - Explique clairement pourquoi tu penses que la décision est incorrecte ou injustifiée
    - Ajoute, si possible, tout élément de preuve ou contexte utile

    Un membre de l'équipe sécurité de Noctis examinera ton appel et pourra suspendre la suppression programmée jusqu'à la décision finale.

    – L'équipe sécurité de Noctis
account_temp_banned:
  subject: Ton compte Noctis a été temporairement suspendu
  body: |-
    Salut {username},

    Ton compte Noctis a été temporairement suspendu, car tu as enfreint nos conditions d'utilisation ou nos règles de la communauté.

    Durée : {durationHours, plural,
      =1 {1 heure}
      other {# heures}
    }
    Suspendu jusqu'au : {bannedUntil, date, full} {bannedUntil, time, short}

    {reason, select,
      null {}
      other {Motif : {reason}}
    }

    Pendant cette période, tu ne pourras pas accéder à ton compte.

    Merci de consulter :
    - Conditions d'utilisation : {termsUrl}
    - Règles de la communauté : {guidelinesUrl}

    Si tu penses que cette décision est incorrecte ou injustifiée, tu peux faire appel en envoyant un e-mail à appeals@noctis.app depuis cette adresse e-mail. Explique clairement pourquoi tu penses que la décision est incorrecte. Nous examinerons ton appel et reviendrons vers toi avec notre décision.

    – L'équipe sécurité de Noctis
donation_confirmation:
  subject: Merci pour votre don à Noctis
  body: |-
    Bonjour,

    Merci pour votre don à Noctis ! Votre {interval, select,
      month {don récurrent}
      year {don récurrent}
      other {don unique}
    } a été {interval, select,
      month {configuré}
      year {configuré}
      other {traité}
    } avec succès.

    Détails du don :
    Montant : {amount} {currency} {interval, select,
      month {par mois}
      year {par an}
      other {}
    }

    Stripe vous enverra séparément par e-mail un reçu avec votre facture PDF sous peu. Celui-ci inclut tous les détails de paiement et peut être utilisé à des fins fiscales.

    Vous pouvez consulter votre historique de dons, télécharger vos factures, {interval, select,
      month {et gérer ou annuler votre abonnement}
      year {et gérer ou annuler votre abonnement}
      other {et gérer vos futurs dons}
    } à tout moment en utilisant ce lien :

    {manageUrl}

    Votre soutien aide à maintenir Noctis en fonctionnement. Merci !

    – L'équipe Noctis
donation_magic_link:
  subject: Gérez vos dons Noctis
  body: |-
    Bonjour,

    Cliquez sur le lien ci-dessous pour accéder à votre portail donateur :

    {manageUrl}

    Dans le portail, vous pouvez gérer les abonnements, télécharger les factures et consulter votre historique de dons.

    Ce lien expire le {expiresAt, date, full} à {expiresAt, time, short}.

    Si vous n'avez pas demandé ce lien, vous pouvez ignorer cet e-mail en toute sécurité.

    – L'équipe Noctis
dsa_report_verification:
  subject: Vérifie ton adresse e-mail pour un signalement DSA
  body: |-
    Salut,

    Utilise le code ci-dessous pour envoyer ton signalement au titre du Digital Services Act (DSA) sur Noctis :

    {code}

    Ce code expire le {expiresAt, date, full} à {expiresAt, time, short}.

    Si tu n'es pas à l'origine de cette demande, tu peux ignorer cet e-mail.

    – L'équipe sécurité de Noctis
email_change_new:
  subject: Vérifie ta nouvelle adresse e-mail Noctis
  body: |-
    Salut {username},

    Entre ce code dans l'application pour vérifier ta nouvelle adresse e-mail Noctis :

    {code}

    Ce code expire le {expiresAt, date, full} à {expiresAt, time, short}.

    Si tu n'es pas à l'origine de cette demande, tu peux ignorer cet e-mail.

    – L'équipe Noctis
email_change_original:
  subject: Confirme le changement d'adresse e-mail sur ton compte Noctis
  body: |-
    Salut {username},

    Nous avons reçu une demande de changement d'adresse e-mail sur ton compte Noctis.

    Pour confirmer ce changement, entre ce code dans l'application :

    {code}

    Ce code expire le {expiresAt, date, full} à {expiresAt, time, short}.

    Si tu n'es pas à l'origine de cette demande, sécurise ton compte immédiatement.

    – L'équipe Noctis
email_change_revert:
  subject: Ton adresse e-mail Noctis a été modifiée
  body: |-
    Salut {username},

    L'adresse e-mail de ton compte Noctis a été remplacée par {newEmail}.

    Si c'était toi, tu n'as rien à faire. Si ce n'était pas toi, tu peux annuler le changement et sécuriser ton compte via ce lien :

    {revertUrl}

    Cela restaurera ton ancienne adresse e-mail, te déconnectera de partout, supprimera les numéros de téléphone associés, désactivera l'authentification multifacteur (MFA) et t'obligera à définir un nouveau mot de passe.

    – L'équipe sécurité de Noctis
email_verification:
  subject: Vérifie ton adresse e-mail Noctis
  body: |-
    Salut {username},

    Vérifie l'adresse e-mail de ton compte Noctis en cliquant sur le lien ci-dessous :

    {verifyUrl}

    Si tu n'as pas créé de compte Noctis, tu peux ignorer cet e-mail sans risque.

    Ce lien est valable 24 heures.

    – L'équipe Noctis
gift_chargeback_notification:
  subject: Les avantages de ton cadeau utilisé ont été retirés
  body: |-
    Salut {username},

    Un code cadeau que tu as utilisé a été payé à l'origine par quelqu'un d'autre. Le paiement a ensuite fait l'objet d'une rétrofacturation (chargeback).

    Par conséquent, nous avons retiré les avantages qui avaient été ajoutés à ton compte lors de l'utilisation du cadeau.

    Si tu penses qu'il s'agit d'une erreur, contacte notre support et indique tous les détails dont tu disposes sur le code cadeau et la date à laquelle tu l'as utilisé.

    – L'équipe Noctis
harvest_completed:
  subject: Ton export de données Noctis est prêt à être téléchargé
  body: |-
    Salut {username},

    Ton export de données est prêt.

    Lien de téléchargement :
    {downloadUrl}

    Messages inclus : {totalMessages, number}
    Taille du fichier : {fileSizeMB, number} MB

    Ce lien expire le {expiresAt, date, full} à {expiresAt, time, short}.

    Si tu n'as pas demandé cet export, change ton mot de passe immédiatement et contacte notre support.

    – L'équipe Noctis
inactivity_warning:
  subject: Ton compte Noctis va être supprimé pour inactivité
  body: |-
    Salut {username},

    Nous n'avons constaté aucune activité sur ton compte Noctis depuis le {lastActiveDate, date, full}.

    Si tu ne te reconnectes pas avant le {deletionDate, date, full} à {deletionDate, time, short}, ton compte sera supprimé définitivement pour inactivité.

    Connecte-toi ici :
    {loginUrl}

    Si tu as utilisé Noctis récemment, contacte notre support immédiatement.

    – L'équipe Noctis
ip_authorization:
  subject: Autorise une connexion depuis une nouvelle adresse IP
  body: |-
    Salut {username},

    Nous avons détecté une tentative de connexion à ton compte Noctis depuis une nouvelle adresse IP :

    Adresse IP : {ipAddress}
    Localisation : {location}

    Si c'était toi, autorise cette adresse IP via le lien ci-dessous :

    {authUrl}

    Si tu n'as pas essayé de te connecter, change ton mot de passe immédiatement.

    Ce lien d'autorisation expire dans 30 minutes.

    – L'équipe Noctis
password_change_verification:
  subject: Confirme le changement de ton mot de passe Noctis
  body: |-
    Salut {username},

    Nous avons reçu une demande de changement de mot de passe sur ton compte Noctis.

    Pour confirmer ce changement, entre ce code dans l'application :

    {code}

    Ce code expire le {expiresAt, date, full} à {expiresAt, time, short}.

    Si tu n'es pas à l'origine de cette demande, quelqu'un a peut-être accès à ton compte. Change ton mot de passe immédiatement et active l'authentification à deux facteurs.

    – L'équipe Noctis
password_reset:
  subject: Réinitialise ton mot de passe Noctis
  body: |-
    Salut {username},

    Tu as demandé à réinitialiser ton mot de passe Noctis. Utilise le lien ci-dessous pour définir un nouveau mot de passe :

    {resetUrl}

    Si tu n'es pas à l'origine de cette demande, tu peux ignorer cet e-mail sans risque.

    Ce lien expire dans 1 heure.

    – L'équipe Noctis
registration_approved:
  subject: Ton inscription Noctis a été approuvée
  body: |-
    Salut {username},

    Bonne nouvelle, ton inscription Noctis a été approuvée.

    Tu peux maintenant te connecter à l'application Noctis ici :
    {channelsUrl}

    Bienvenue dans la communauté Noctis.

    – L'équipe Noctis
report_resolved:
  subject: Ton signalement Noctis a été examiné
  body: |-
    Salut {username},

    Ton signalement (ID : {reportId}) a été examiné par notre équipe sécurité.

    Réponse de l'équipe sécurité :
    {publicComment}

    Merci d'aider à garder Noctis sûr et agréable pour tout le monde. Nous prenons tous les signalements au sérieux et apprécions ta contribution à la communauté.

    Si tu as des questions ou des inquiétudes à propos de ce résultat, contacte safety@noctis.app.

    – L'équipe sécurité de Noctis
scheduled_deletion_notification:
  subject: Ton compte Noctis va être supprimé définitivement
  body: |-
    Salut {username},

    Ton compte Noctis a été programmé pour une suppression définitive.

    Date de suppression : {deletionDate, date, full} {deletionDate, time, short}

    {reason, select,
      null {}
      other {Motif : {reason}}
    }

    C'est une mesure de modération sérieuse. Les données de ton compte seront supprimées définitivement à la date prévue.

    Si tu penses que cette décision est incorrecte, tu peux faire appel en envoyant un e-mail à appeals@noctis.app depuis cette adresse e-mail.

    – L'équipe sécurité de Noctis
self_deletion_scheduled:
  subject: La suppression de ton compte Noctis est programmée
  body: |-
    Salut {username},

    Tu as demandé la suppression de ton compte Noctis. Ton compte sera supprimé définitivement le :

    {deletionDate, date, full} à {deletionDate, time, short}

    Si tu n'es pas à l'origine de cette demande, connecte-toi à ton compte pour annuler la suppression. Nous te recommandons aussi de changer ton mot de passe pour sécuriser ton compte.

    – L'équipe Noctis
unban_notification:
  subject: La suspension de ton compte Noctis a été levée
  body: |-
    Salut {username},

    Bonne nouvelle, la suspension de ton compte Noctis a été levée.

    {reason, select,
      null {}
      other {Motif : {reason}}
    }

    Tu peux maintenant te reconnecter et continuer à utiliser Noctis.

    – L'équipe sécurité de Noctis
